services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: vigamonitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: VigaMonitor2025
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vigamonitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://postgres:VigaMonitor2025@db:5432/vigamonitor
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: